<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div class="min-h-screen flex items-center justify-center px-4">
      <div class="glass w-full max-w-md rounded-3xl p-8">
        <h1 class="text-white text-4xl font-bold text-center">Lumina</h1>

        <p class="text-gray-400 text-center mt-2">
          Estude com inteligência artificial
        </p>
        <div class="flex bg-[#181825] rounded-xl p-1 mt-8">
          <button
            type="button"
            id="login-tab"
            class="flex-1 py-2 rounded-lg bg-violet-600 text-white"
          >
            Entrar
          </button>

          <button
            type="button"
            id="register-tab"
            class="flex-1 py-2 rounded-lg text-gray-400"
          >
            Cadastro
          </button>
        </div>
        <form id="login-form" class="mt-6 space-y-4">
          <input
            type="email"
            placeholder="Email"
            id="login-email"
            class="w-full bg-[#181825] text-white px-4 py-3 rounded-xl outline-none"
          />

          <input
            type="password"
            placeholder="Senha"
            id="login-password"
            class="w-full bg-[#181825] text-white px-4 py-3 rounded-xl outline-none"
          />

          <button
            type="submit"
            class="w-full bg-violet-600 hover:bg-violet-700 transition py-3 rounded-xl text-white font-medium"
          >
            Entrar
          </button>
        </form>
        <form id="register-form" class="mt-6 space-y-4 hidden">
          <input
            type="text"
            id="register-name"
            placeholder="Nome"
            class="w-full bg-[#181825] text-white px-4 py-3 rounded-xl outline-none"
            required
          />

          <input
            type="email"
            placeholder="Email"
            id="register-email"
            class="w-full bg-[#181825] text-white px-4 py-3 rounded-xl outline-none"
          />

          <input
            type="password"
            placeholder="Senha"
            id="register-password"
            class="w-full bg-[#181825] text-white px-4 py-3 rounded-xl outline-none"
          />

          <button
            type="submit"
            class="w-full bg-violet-600 hover:bg-violet-700 transition py-3 rounded-xl text-white font-medium"
          >
            Criar Conta
          </button>
        </form>
      </div>
    </div>

    <script src="src/scripts/api.js"></script>
    <script src="src/scripts/login-register.js"></script>
  </body>
</html>
