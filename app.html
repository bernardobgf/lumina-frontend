<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App — Lumina</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .scrollbar::-webkit-scrollbar-thumb {
        background: #2a2440;
        border-radius: 3px;
      }
    </style>
  </head>
  <body class="bg-background text-white h-screen overflow-hidden">
    <div class="h-screen flex">
      <!-- Sidebar -->
      <aside class="w-64 flex flex-col border-r border-border bg-surface">
        <div class="p-5 flex items-center gap-2.5">
          <div
            class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary"
          >
            <svg
              class="h-4 w-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 3l2 5 5 2-5 2-2 5-2-5-5-2 5-2z"
              />
            </svg>
          </div>
          <span class="font-semibold">Lumina</span>
        </div>
        <div class="px-3">
          <button
            id="btn-new-chat"
            class="w-full flex items-center gap-2 rounded-xl border border-border px-3 py-2 text-sm hover:bg-surface-2 transition"
          >
            <svg
              class="h-4 w-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 4v16m8-8H4"
              />
            </svg>
            novo chat
          </button>
        </div>
        <div
          class="px-5 mt-6 text-[10px] uppercase tracking-widest text-muted-fg"
        >
          conversas
        </div>
        <div
          id="chats-list"
          class="flex-1 overflow-y-auto scrollbar px-3 py-2 space-y-0.5"
        >
          <p class="px-2 py-3 text-xs text-muted-fg">Carregando...</p>
        </div>
        <div
          class="border-t border-border p-3 flex items-center justify-between"
        >
          <div class="flex items-center gap-2 min-w-0">
            <div
              class="h-8 w-8 rounded-full bg-primary/80 flex items-center justify-center text-xs font-semibold"
            >
              EU
            </div>
            <span class="text-sm truncate">Você</span>
          </div>
          <button
            id="btn-settings"
            class="rounded-lg p-1.5 text-muted-fg hover:bg-muted hover:text-white transition"
            aria-label="Configurações"
          >
            <svg
              class="h-4 w-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              />
            </svg>
          </button>
        </div>
      </aside>

      <!-- Chat -->
      <main class="flex-1 flex flex-col min-w-0">
        <header
          class="h-14 border-b border-border flex items-center justify-between px-5"
        >
          <h1 id="chat-title" class="text-sm font-medium truncate">
            Selecione ou crie um chat
          </h1>
          <button
            id="btn-toggle-exercises"
            class="rounded-lg p-1.5 text-muted-fg hover:bg-muted hover:text-white transition"
          >
            <svg
              class="h-4 w-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 6h16M4 12h16M4 18h7"
              />
            </svg>
          </button>
        </header>

        <div
          id="messages"
          class="flex-1 overflow-y-auto scrollbar px-5 py-6 space-y-4"
        >
          <div class="text-center text-sm text-muted-fg py-12">
            Crie um chat para começar.
          </div>
        </div>

        <form id="form-send" class="border-t border-border p-4">
          <div
            class="mx-auto max-w-3xl flex items-center gap-2 rounded-2xl border border-border bg-muted px-3 py-2"
          >
            <input
              id="input-message"
              placeholder="pergunte sobre qualquer matéria..."
              disabled
              class="flex-1 bg-transparent outline-none text-sm placeholder:text-muted-fg"
            />
            <button
              id="btn-send"
              type="submit"
              disabled
              class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary text-white hover:bg-primary-hover transition disabled:opacity-40"
            >
              <svg
                class="h-4 w-4"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 19V5m-7 7l7-7 7 7"
                />
              </svg>
            </button>
          </div>
        </form>
      </main>

      <!-- Exercícios -->
      <aside
        id="panel-exercises"
        class="w-72 border-l border-border bg-surface flex flex-col"
      >
        <div
          class="h-14 border-b border-border flex items-center justify-between px-4"
        >
          <h2 class="text-xs uppercase tracking-widest text-muted-fg">
            exercícios
          </h2>
          <button
            id="btn-close-exercises"
            class="text-muted-fg hover:text-white"
          >
            <svg
              class="h-4 w-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <div
          id="exercises-list"
          class="flex-1 overflow-y-auto scrollbar p-3 space-y-2"
        >
          <p class="text-xs text-muted-fg p-2">Nenhum exercício ainda.</p>
        </div>
        <div class="border-t border-border p-3">
          <button
            id="btn-generate"
            class="w-full flex items-center justify-center gap-2 rounded-xl bg-surface-2 border border-border px-3 py-2 text-sm hover:bg-muted transition"
          >
            <svg
              class="h-4 w-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 4v16m8-8H4"
              />
            </svg>
            gerar exercício
          </button>
        </div>
      </aside>
    </div>

    <!-- Modal de configurações -->
    <div
      id="settings-modal"
      class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4"
    >
      <div
        class="w-full max-w-md rounded-2xl border border-border bg-surface p-6"
      >
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold">configurações</h2>
          <button
            id="btn-close-settings"
            class="text-muted-fg hover:text-white"
          >
            <svg
              class="h-4 w-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <div class="mt-5 flex items-center gap-3">
          <div
            class="h-12 w-12 rounded-full bg-primary/80 flex items-center justify-center text-sm font-semibold"
          >
            EU
          </div>
          <div>
            <p class="font-medium">Você</p>
            <p class="text-xs text-muted-fg">estudante</p>
          </div>
        </div>
        <form id="form-settings" class="mt-6 space-y-3">
          <label class="block">
            <span class="text-xs text-muted-fg">apelido</span>
            <input
              name="nickname"
              class="mt-1 w-full rounded-xl border border-border bg-muted px-3 py-2 text-sm focus:outline-none focus:border-primary"
            />
          </label>
          <label class="block">
            <span class="text-xs text-muted-fg">email</span>
            <input
              name="email"
              type="email"
              class="mt-1 w-full rounded-xl border border-border bg-muted px-3 py-2 text-sm focus:outline-none focus:border-primary"
            />
          </label>
          <label class="block">
            <span class="text-xs text-muted-fg">nova senha</span>
            <input
              name="password"
              type="password"
              class="mt-1 w-full rounded-xl border border-border bg-muted px-3 py-2 text-sm focus:outline-none focus:border-primary"
            />
          </label>
          <p id="settings-msg" class="text-xs text-muted-fg"></p>
          <button
            type="submit"
            class="w-full rounded-xl bg-primary py-2.5 text-sm font-medium text-white hover:bg-primary-hover transition"
          >
            salvar alterações
          </button>
        </form>
        <button
          id="btn-logout"
          class="mt-3 w-full flex items-center justify-center gap-2 text-sm text-destructive hover:opacity-80 transition py-2"
        >
          <svg
            class="h-4 w-4"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          sair da conta
        </button>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
