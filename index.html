<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
          <h2 class="logo">Lumina</h2>
          <button class="toggle-btn" id="toggleBtn" aria-label="Recolher menu">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
        </div>

        <div class="sidebar-inner">
          <div class="profile" id="profileBtn">
            <div class="avatar">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="45"
                height="45"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="8" r="4" />
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
              </svg>
            </div>
            <span id="profileName">Perfil</span>
          </div>

          <button class="new-chat" id="newChatBtn">+ Novo chat</button>

          <div class="history">
            <div class="history-header" id="historyHeader">
              <span>Chats</span>
              <span class="chevron open" id="historyChevron">▾</span>
            </div>
            <div class="history-list" id="historyList">
              <p>Funções</p>
              <p>Redação ENEM</p>
              <p>Física</p>
            </div>
          </div>

          <div class="exercises">
            <p class="subtitle">Exercícios</p>
          </div>
        </div>
      </aside>

      <!-- CHAT -->
      <main class="chat">
        <div class="messages" id="messages">
          <div class="msg bot">
            <p>Oi! Vamos estudar para o vestibular hoje?</p>
          </div>
          <div class="msg user">
            <p>Quero revisar função do 2º grau</p>
          </div>
          <div class="msg bot">
            <p>Boa escolha. Quer começar com teoria ou exercícios?</p>
          </div>
        </div>

        <div class="input-area">
          <input
            type="text"
            id="chatInput"
            placeholder="Pergunte qualquer coisa sobre o vestibular..."
          />
          <button id="sendBtn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="19" x2="12" y2="5" />
              <polyline points="5 12 12 5 19 12" />
            </svg>
          </button>
          <button id="attachBtn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
        </div>
      </main>
    </div>

    <!-- MODAL DE PERFIL -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="profile-modal">
        <button class="close-modal" id="closeModal">✕</button>

        <h2>Configurações do Perfil</h2>

        <div class="profile-preview">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="90"
            height="90"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#a78bfa"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
        </div>

        <input type="text" id="inputNome" placeholder="Seu nome" />
        <input type="email" id="inputEmail" placeholder="Seu email" />

        <button class="save-profile" id="saveProfile">Salvar</button>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
